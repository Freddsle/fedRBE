# Dataset configurations for real-dataset evaluation.
# Single source of truth: both Python and R read from this file.
# All paths are relative to the repository root.

ecoli:
  before_matrix: evaluation_data/ecoli/before/central_intensities_log_UNION.tsv
  before_site_matrix_file: intensities_log_UNION.tsv
  corrected_central: evaluation_data/ecoli/after/intensities_log_Rcorrected_UNION.tsv
  corrected_federated: evaluation_data/ecoli/after/FedApp_corrected_data_smpc.tsv
  sites_root: evaluation_data/ecoli/before
  site_glob: "lab_*"
  design_file: design.tsv
  sample_col: file
  condition_col: Pyr

ovarian_cancer:
  before_matrix: evaluation_data/ovarian_cancer/before/all_expression_UNION.tsv
  before_site_matrix_file: expr_for_correction_UNION.tsv
  corrected_central: evaluation_data/ovarian_cancer/after/central_corrected_UNION.tsv
  corrected_federated: evaluation_data/ovarian_cancer/after/FedApp_corrected_data.tsv
  sites_root: evaluation_data/ovarian_cancer/before
  site_glob: "GSE*"
  design_file: design.tsv
  sample_col: file
  condition_col: HGSC

microbiome:
  before_matrix: evaluation_data/microbiome/before/logmin_normalized_counts_5C.tsv
  before_site_matrix_file: UQnorm_log_counts_for_corr.tsv
  corrected_central: evaluation_data/microbiome/after/normalized_logmin_counts_5centers_Rcorrected.tsv
  corrected_federated: evaluation_data/microbiome/after/FedApp_corrected_data_smpc.tsv
  sites_root: evaluation_data/microbiome/before
  site_glob: "*"
  design_file: design_5C.tsv
  sample_col: sample
  condition_col: CRC

quartet:
  before_matrix: evaluation_data/quartet/before/00_initial_data/central_intensities_log_UNION.tsv
  before_site_matrix_file: intensities_log_UNION.tsv
