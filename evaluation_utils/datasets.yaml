# Dataset configurations for real-dataset evaluation.
# Single source of truth: both Python and R read from this file.
# All paths are relative to the repository root.

ecoli:
  before_matrix: evaluation_data/ecoli/before/central_intensities_log_UNION.tsv
  before_site_matrix_file: intensities_log_UNION.tsv
  corrected_central: evaluation_data/ecoli/after/intensities_log_Rcorrected_UNION.tsv
  corrected_federated: evaluation_data/ecoli/after/FedApp_corrected_data_smpc.tsv
  sites_root: evaluation_data/ecoli/before
  site_glob: "lab_*"
  design_file: design.tsv
  sample_col: file
  condition_col: Pyr

ovarian_cancer:
  before_matrix: evaluation_data/ovarian_cancer/before/all_expression_UNION.tsv
  before_site_matrix_file: expr_for_correction_UNION.tsv
  corrected_central: evaluation_data/ovarian_cancer/after/central_corrected_UNION.tsv
  corrected_federated: evaluation_data/ovarian_cancer/after/FedApp_corrected_data.tsv
  sites_root: evaluation_data/ovarian_cancer/before
  site_glob: "GSE*"
  design_file: design.tsv
  sample_col: file
  condition_col: HGSC

quartet:
  before_matrix: evaluation_data/quartet/before/00_initial_data/central_intensities_log_UNION.tsv
  before_site_matrix_file: intensities_log_UNION.tsv
  corrected_central: evaluation_data/quartet/after/intensities_log_Rcorrected_UNION.tsv
  corrected_federated: evaluation_data/quartet/after/FedApp_corrected_data_smpc.tsv
  sites_root: evaluation_data/quartet/before
  site_glob: "[A-Z]*"
  design_file: design.tsv
  sample_col: file
  condition_col: condition

ccRCC_proteomics:
  before_matrix: evaluation_data/ccRCC_studies/before/central_intensities_log_UNION.tsv
  before_site_matrix_file: report_filtered.tsv
  corrected_central: evaluation_data/ccRCC_studies/after/intensities_log_Rcorrected_UNION.tsv
  corrected_federated: evaluation_data/ccRCC_studies/after/FedApp_corrected_data_smpc.tsv
  sites_root: evaluation_data/ccRCC_studies/before
  site_glob: "P*"
  design_file: design.tsv
  sample_col: rowname
  condition_col: Condition

# Quartet multiomics: k-means runs on the joint matrix containing all three
# modalities together (Transcriptomics + Proteomics + Metabolomics rows
# stacked vertically; columns are pseudo-matched samples). The joint matrix
# itself is built by
#   evaluation_clusterization_after_correction/real_datasets/
#       00_build_kmeans_matrices.ipynb
# which also writes per-client splits under evaluation_data/multiomics/before/.
# `n_init: 50` is a robustness override for the small (48-sample) joint
# matrix; the standard per-feature StandardScaler / fc_kmeans scaling applies.
multiomics:
  before_matrix: evaluation_data/multiomics/after/all_modalities_before_kmeans_matrix.tsv
  before_site_matrix_file: intensities.tsv
  corrected_central: evaluation_data/multiomics/after/all_modalities_corrected_kmeans_matrix.tsv
  corrected_federated: evaluation_data/multiomics/after/all_modalities_fedsim_kmeans_matrix.tsv
  sites_root: evaluation_data/multiomics/before
  site_glob: "client_*"
  design_file: design.tsv
  sample_col: file
  condition_col: condition
  n_init: 50
